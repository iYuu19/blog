<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iYuu Notes 后台</title>
    <link rel="stylesheet" href="/admin/admin.css" />
    <link
      rel="stylesheet"
      href="https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css"
    />
  </head>
  <body>
    <section class="admin-loading" id="admin-loading">
      <div class="admin-loading__card">
        <p class="admin-loading__eyebrow">iYuu Notes</p>
        <h1>后台加载中</h1>
        <p>登录后可以直接管理文章、页面文案和站点设置。如果后台没有自动出现，刷新一次即可。</p>
      </div>
    </section>

    <noscript>后台需要启用 JavaScript。</noscript>

    <script>
      const loading = document.getElementById("admin-loading");
      const editorScriptSources = [
        "https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js",
        "https://cdn.jsdelivr.net/npm/@toast-ui/editor@3.2.2/dist/toastui-editor-all.min.js"
      ];
      const cmsScriptSources = [
        "https://unpkg.com/decap-cms@3.14.0/dist/decap-cms.js",
        "https://cdn.jsdelivr.net/npm/decap-cms@3.14.0/dist/decap-cms.js"
      ];

      function updateLoadingState(message) {
        const paragraph = loading?.querySelector("p:last-of-type");
        if (paragraph && message) {
          paragraph.textContent = message;
        }
      }

      function waitForCmsRender() {
        const start = Date.now();

        function check() {
          const root = document.getElementById("nc-root");
          if (root && root.childElementCount > 0) {
            loading?.setAttribute("hidden", "hidden");
            return;
          }

          if (Date.now() - start > 12000) {
            updateLoadingState("后台核心已经加载，但界面还没出来。刷新一次；如果还是空白，再重新登录。");
            return;
          }

          window.requestAnimationFrame(check);
        }

        check();
      }

      function loadScript(sources, index = 0) {
        const source = sources[index];

        if (!source) {
          return Promise.reject(new Error("all script sources failed"));
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = source;
          script.async = true;
          script.onload = () => resolve(source);
          script.onerror = () => {
            script.remove();
            loadScript(sources, index + 1).then(resolve).catch(reject);
          };
          document.body.appendChild(script);
        });
      }

      function loadLocalScript(source) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = source;
          script.async = false;
          script.onload = () => resolve(source);
          script.onerror = () => reject(new Error(`failed to load ${source}`));
          document.body.appendChild(script);
        });
      }

      async function bootAdmin() {
        try {
          updateLoadingState("正在加载可视化编辑器…");
          await loadScript(editorScriptSources);
          updateLoadingState("正在加载后台核心…");
          await loadScript(cmsScriptSources);
          await loadLocalScript("/admin/wordish-widget.js");
          waitForCmsRender();
        } catch (error) {
          updateLoadingState("后台核心加载失败了。通常是 CDN 资源没拉下来，刷新一次或换个网络再试。");
          console.error(error);
        }
      }

      bootAdmin();
    </script>
  </body>
</html>
