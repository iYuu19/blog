<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>iYuu Notes 后台</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f7f5ef;
        color: #1d2228;
        font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      }

      .admin-loading {
        max-width: 720px;
        margin: 32px auto 0;
        padding: 0 20px;
      }

      .admin-loading__card {
        border: 1px solid #ddd4c5;
        border-radius: 18px;
        background: rgba(255, 253, 249, 0.94);
        box-shadow: 0 16px 36px rgba(20, 24, 28, 0.06);
        padding: 20px 22px;
      }

      .admin-loading__eyebrow {
        margin: 0 0 8px;
        color: #6b756f;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .admin-loading h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.25;
      }

      .admin-loading p {
        margin: 10px 0 0;
        color: #46505a;
        font-size: 14px;
        line-height: 1.8;
      }

      .admin-loading[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <section class="admin-loading" id="admin-loading">
      <div class="admin-loading__card">
        <p class="admin-loading__eyebrow">iYuu Notes</p>
        <h1>后台加载中</h1>
        <p>登录后可以直接管理文章、页面文案和站点设置。如果后台没有自动出现，刷新一次即可。</p>
      </div>
    </section>

    <noscript>后台需要启用 JavaScript。</noscript>

    <script>
      const loading = document.getElementById("admin-loading");
      const cmsScriptSources = [
        "https://unpkg.com/decap-cms@3.13.0/dist/decap-cms.js",
        "https://cdn.jsdelivr.net/npm/decap-cms@3.13.0/dist/decap-cms.js"
      ];

      function updateLoadingState(message) {
        const paragraph = loading?.querySelector("p:last-of-type");
        if (paragraph && message) {
          paragraph.textContent = message;
        }
      }

      function waitForCmsRender() {
        const start = Date.now();

        function check() {
          const root = document.getElementById("nc-root");
          if (root && root.childElementCount > 0) {
            loading?.setAttribute("hidden", "hidden");
            return;
          }

          if (Date.now() - start > 12000) {
            updateLoadingState("后台核心已经加载，但界面还没出来。刷新一次；如果还是空白，再重新登录。");
            return;
          }

          window.requestAnimationFrame(check);
        }

        check();
      }

      function loadCmsScript(index = 0) {
        const source = cmsScriptSources[index];

        if (!source) {
          updateLoadingState("后台核心加载失败了。通常是 CDN 资源没拉下来，刷新一次或换个网络再试。");
          return;
        }

        const script = document.createElement("script");
        script.src = source;
        script.async = true;
        script.onload = () => {
          waitForCmsRender();
        };
        script.onerror = () => {
          loadCmsScript(index + 1);
        };
        document.body.appendChild(script);
      }

      loadCmsScript();
    </script>
  </body>
</html>
