backend:
  name: github
  repo: iYuu19/blog
  branch: main
  base_url: https://0xiyuu.top
  auth_endpoint: api/auth

locale: zh_Hans
site_url: https://0xiyuu.top
display_url: https://0xiyuu.top
logo_url: /avatar.jpg
publish_mode: simple

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: blog
    label: 文章中心
    label_singular: 文章
    description: 新建、编辑、草稿、首页推荐都在这里，是日常写博客的主入口。
    folder: src/content/blog
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}}"
    sortable_fields:
      - pubDate
      - updatedDate
      - title
      - featured
      - draft
      - category
    view_filters:
      - label: 草稿
        field: draft
        pattern: true
      - label: 已发布
        field: draft
        pattern: false
      - label: 首页推荐
        field: featured
        pattern: true
      - label: 比赛 WP
        field: category
        pattern: 比赛 WP
      - label: 赛后复盘
        field: category
        pattern: 赛后复盘
      - label: 专题总结
        field: category
        pattern: 专题总结
    editor:
      preview: false
    fields:
      - label: 标题
        name: title
        widget: string
      - label: 摘要
        name: description
        widget: text
      - label: 发布时间
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: 更新日期
        name: updatedDate
        widget: datetime
        required: false
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: 分类
        name: category
        widget: select
        default: 比赛 WP
        create: true
        options:
          - 比赛 WP
          - 赛后复盘
          - 专题总结
          - 学习笔记
          - 工具记录
      - label: 比赛名
        name: contest
        widget: string
        required: false
      - label: 比赛标识
        name: contestSlug
        widget: string
        required: false
      - label: 封面图
        name: coverImage
        widget: image
        required: false
        media_folder: public/contest-covers
        public_folder: /contest-covers
      - label: 方向
        name: track
        widget: select
        required: false
        create: true
        options:
          - Web
          - Misc
          - 电子取证
          - 流量分析
          - 逆向
          - 密码
          - Pwn
      - label: 标签
        name: tags
        widget: list
        required: false
        field:
          label: 标签
          name: tag
          widget: string
      - label: 平台 / OJ
        name: oj
        widget: string
        required: false
      - label: 难度 / 备注
        name: difficulty
        widget: select
        default: Notes
        create: true
        options:
          - Notes
          - Easy
          - Medium
          - Hard
      - label: 语言
        name: language
        widget: string
        default: Markdown
      - label: 首页推荐
        name: featured
        widget: boolean
        default: false
        required: false
      - label: 草稿
        name: draft
        widget: boolean
        default: false
        required: false
      - label: 正文
        name: body
        widget: wordish
        hint: 支持直接粘贴截图、拖拽图片和插入代码块。默认是可视化编辑，也可以切到 Markdown 看源码。

  - name: structure_center
    label: 结构与导航
    delete: false
    description: 这里控制站点结构，不只是改字，还能决定首页板块顺序、侧栏内容和导航。
    editor:
      preview: false
    files:
      - name: site_navigation
        label: 导航菜单
        file: src/content/site-navigation/navigation.yaml
        fields:
          - label: 导航链接
            name: navLinks
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: 名称, name: label, widget: string }
              - { label: 路径, name: href, widget: string }
      - name: home_layout
        label: 首页结构与全站公共区
        file: src/content/site-layout/layout.yaml
        fields:
          - { label: 头部按钮文案, name: headerCtaLabel, widget: string, required: false }
          - { label: 头部按钮链接, name: headerCtaHref, widget: string, required: false }
          - { label: 页脚卡片眉题, name: footerPanelEyebrow, widget: string, required: false }
          - { label: 页脚卡片标题, name: footerPanelTitle, widget: string }
          - { label: 页脚卡片说明, name: footerPanelText, widget: text }
          - { label: 首页索引标题, name: homeIndexTitle, widget: string }
          - label: 首页索引说明模板
            name: homeIndexMetaTemplate
            widget: string
            hint: 可用变量 {{count}} 和 {{date}}，例如：目前 {{count}} 篇，最近更新在 {{date}}。
          - { label: 首页索引说明块标题, name: homeIndexFocusLabel, widget: string }
          - { label: 首页索引说明块内容, name: homeIndexFocusText, widget: text }
          - label: 首页板块编排
            name: homeSections
            widget: list
            summary: "{{fields.type}} / {{fields.placement}} / {{fields.title}}"
            hint: 可拖拽排序。内置板块可以改顺序、改位置、隐藏；自定义说明块请把类型选为 note。
            fields:
              - label: 板块类型
                name: type
                widget: select
                options:
                  - { label: 推荐文章, value: featured }
                  - { label: 最近更新, value: fresh }
                  - { label: 比赛 WP 列表, value: writeups }
                  - { label: 比赛入口卡片, value: contests }
                  - { label: 内容分类卡片, value: categories }
                  - { label: 内容路线图, value: routes }
                  - { label: 赛后复盘列表, value: reviews }
                  - { label: 标签云, value: tags }
                  - { label: 专题总结列表, value: summaries }
                  - { label: 自定义说明块, value: note }
              - { label: 是否显示, name: enabled, widget: boolean, default: true }
              - label: 所在列
                name: placement
                widget: select
                default: main
                options:
                  - { label: 主内容列, value: main }
                  - { label: 侧栏列, value: side }
              - label: 标题覆盖
                name: title
                widget: string
                required: false
                hint: 不填则使用系统默认标题；note 类型建议填写。
              - label: 说明文字
                name: note
                widget: text
                required: false
                hint: 对 note 类型是正文，对内置板块则会作为副说明使用。
              - { label: 链接文案, name: linkLabel, widget: string, required: false }
              - { label: 链接地址, name: linkHref, widget: string, required: false }
              - label: 锚点标识
                name: anchor
                widget: string
                required: false
                hint: 用于首页左侧索引跳转，建议用英文或短横线，例如 featured / update-method。
      - name: category_definitions
        label: 分类说明卡
        file: src/content/site-categories/categories.yaml
        fields:
          - label: 分类列表
            name: categories
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: 分类名, name: name, widget: string }
              - { label: 链接标识, name: slug, widget: string, required: false }
              - { label: 分类说明, name: description, widget: text }
              - { label: 适合写什么, name: writingFocus, widget: text }
              - label: 示例内容
                name: exampleTopics
                widget: list
                required: false
                field:
                  label: 示例
                  name: item
                  widget: string
              - { label: 排序, name: sortOrder, widget: number, value_type: int, default: 100, required: false }

  - name: page_center
    label: 页面文案
    delete: false
    description: 首页、关于页、留言板、归档页等固定页面文案都在这里改。
    editor:
      preview: false
    files:
      - name: home_page_copy
        label: 首页文案
        file: src/content/site-home/home.yaml
        fields:
          - { label: 首页眉题, name: homeEyebrow, widget: string }
          - { label: 首页标题, name: homeTitle, widget: string }
          - { label: 首页导语, name: homeLead, widget: text }
          - label: 首页介绍段落
            name: homeIntro
            widget: list
            field: { label: 段落, name: item, widget: text }
          - label: Hero 快捷链接
            name: heroLinks
            widget: list
            fields:
              - { label: 文案, name: label, widget: string }
              - { label: 链接, name: href, widget: string }
          - { label: 浏览方式标题, name: browseTitle, widget: string }
          - label: 浏览方式提示
            name: browseTips
            widget: list
            field: { label: 提示, name: item, widget: string }
          - { label: 常用入口标题, name: commonEntryTitle, widget: string }
          - { label: 推荐文章标题, name: featuredHeading, widget: string }
          - { label: 最近更新标题, name: freshHeading, widget: string }
          - { label: 最近更新说明, name: freshNote, widget: string }
          - { label: 比赛 WP 标题, name: writeupsHeading, widget: string }
          - { label: 比赛 WP 空状态, name: writeupsEmpty, widget: text }
          - { label: 比赛区标题, name: contestsHeading, widget: string }
          - { label: 分类区标题, name: categoriesHeading, widget: string }
          - { label: 路线图区标题, name: routesHeading, widget: string }
          - { label: 路线图区说明, name: routesNote, widget: text }
          - label: 路线图卡片
            name: routeCards
            widget: list
            fields:
              - { label: 标题, name: title, widget: string }
              - { label: 描述, name: description, widget: text }
              - { label: 空状态最近内容, name: emptyLatestTitle, widget: string }
          - { label: 更新方式标题, name: updateMethodHeading, widget: string }
          - { label: 更新方式说明, name: updateMethodText, widget: text }
          - { label: 持续补充标题, name: fillingHeading, widget: string }
          - { label: 持续补充说明, name: fillingText, widget: text }
          - { label: 赛后复盘标题, name: reviewsHeading, widget: string }
          - { label: 赛后复盘空状态, name: reviewsEmpty, widget: text }
          - { label: 标签区标题, name: tagsHeading, widget: string }
          - { label: 专题总结标题, name: summariesHeading, widget: string }
          - { label: 专题总结空状态, name: summariesEmpty, widget: text }
      - name: about_page_copy
        label: 关于页文案
        file: src/content/site-about/about.yaml
        fields:
          - { label: 眉题, name: aboutEyebrow, widget: string }
          - { label: 标题, name: aboutTitle, widget: string }
          - { label: 头像替代文案, name: aboutAvatarAlt, widget: string }
          - label: 开场段落
            name: aboutIntro
            widget: list
            field: { label: 段落, name: paragraph, widget: text }
          - { label: 文章统计标签, name: aboutPostsLabel, widget: string }
          - { label: 分类统计标签, name: aboutCategoriesLabel, widget: string }
          - { label: 标签统计标签, name: aboutTagsLabel, widget: string }
          - { label: 内容地图标签, name: contentMapLabel, widget: string }
          - { label: 常见标签标题, name: commonTagsLabel, widget: string }
          - { label: 主要内容标签, name: focusLabel, widget: string }
          - { label: 主要内容标题, name: focusTitle, widget: string }
          - label: 主要内容列表
            name: aboutFocusAreas
            widget: list
            field: { label: 条目, name: item, widget: string }
          - { label: 写作方式标签, name: writingLabel, widget: string }
          - { label: 写作方式标题, name: writingTitle, widget: string }
          - label: 写作方式列表
            name: aboutWritingApproach
            widget: list
            field: { label: 条目, name: item, widget: string }
          - { label: 说明模块标签, name: noteLabel, widget: string }
          - { label: 说明模块标题, name: noteTitle, widget: string }
          - { label: 说明模块内容, name: aboutNote, widget: text }
          - { label: 比赛模块标签, name: contestsLabel, widget: string }
          - { label: 比赛模块空状态, name: contestsEmpty, widget: text }
          - { label: 比赛模块统计文案, name: contestsMeta, widget: string }
          - { label: 最近内容标题, name: latestContentHeading, widget: string }
          - { label: 最近内容说明, name: latestContentNote, widget: string }
          - { label: 浏览引导标签, name: browseGuideLabel, widget: string }
          - label: 浏览引导卡片
            name: browseGuides
            widget: list
            fields:
              - { label: 标题, name: title, widget: string }
              - { label: 描述, name: description, widget: text }
      - name: guestbook_page_copy
        label: 留言板文案
        file: src/content/site-guestbook/guestbook.yaml
        fields:
          - { label: 页面描述, name: pageDescription, widget: text }
          - { label: 眉题, name: heroEyebrow, widget: string }
          - { label: 标题, name: heroTitle, widget: string }
          - { label: 导语, name: heroLead, widget: text }
          - label: 介绍段落
            name: heroIntro
            widget: list
            field: { label: 段落, name: item, widget: text }
          - label: 标签胶囊
            name: pillBadges
            widget: list
            field: { label: 文案, name: item, widget: string }
          - label: 快捷链接
            name: quickLinks
            widget: list
            fields:
              - { label: 文案, name: label, widget: string }
              - { label: 链接, name: href, widget: string }
          - { label: 提醒标题, name: reminderTitle, widget: string }
          - label: 提醒列表
            name: reminders
            widget: list
            field: { label: 提醒, name: item, widget: string }
          - { label: 聊天引导标题, name: chatGuideTitle, widget: string }
          - label: 聊天引导列表
            name: chatGuides
            widget: list
            field: { label: 引导, name: item, widget: string }
          - label: 中部卡片
            name: messageIdeas
            widget: list
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 内容, name: text, widget: text }
          - { label: 登录说明眉题, name: loginPanelEyebrow, widget: string }
          - { label: 登录说明标题, name: loginPanelTitle, widget: string }
          - { label: 登录说明内容, name: loginPanelText, widget: text }
          - { label: 评论区眉题, name: commentsEyebrow, widget: string }
          - { label: 评论区标题, name: commentsTitle, widget: string }
          - { label: 评论区说明, name: commentsDescription, widget: text }
      - name: archive_page_copy
        label: 归档页文案
        file: src/content/site-archive/archive.yaml
        fields:
          - { label: 页面标题, name: pageTitle, widget: string }
          - { label: 页面描述, name: pageDescription, widget: text }
          - { label: 眉题, name: heroEyebrow, widget: string }
          - { label: 主标题, name: heroTitle, widget: string }
          - { label: 介绍, name: heroIntro, widget: text }
          - { label: 文章数标签, name: postsLabel, widget: string }
          - { label: 比赛 WP 标签, name: writeupsLabel, widget: string }
          - { label: 复盘标签, name: reviewsLabel, widget: string }
          - { label: 索引标题, name: indexTitle, widget: string }
          - { label: 索引说明, name: indexMeta, widget: string }
          - { label: 建议标题, name: indexBlockLabel, widget: string }
          - { label: 建议内容, name: indexBlockText, widget: text }
          - { label: 全部文章区标题, name: allPostsHeading, widget: string }
          - { label: 全部文章区说明, name: allPostsNote, widget: string }
          - { label: 常看标签区标题, name: commonTagsHeading, widget: string }
      - name: categories_page_copy
        label: 分类页文案
        file: src/content/site-categories-page/categories-page.yaml
        fields:
          - { label: 页面标题, name: pageTitle, widget: string }
          - { label: 页面描述, name: pageDescription, widget: text }
          - { label: 眉题, name: heroEyebrow, widget: string }
          - { label: 主标题, name: heroTitle, widget: string }
          - { label: 介绍, name: heroIntro, widget: text }
          - { label: 分类数标签, name: categoriesLabel, widget: string }
          - { label: 文章数标签, name: postsLabel, widget: string }
          - { label: 活跃标签, name: activeLabel, widget: string }
          - { label: 最近内容前缀, name: latestPrefix, widget: string }
          - { label: 准备中文案, name: preparingText, widget: string }
          - label: 引导卡片
            name: guideCards
            widget: list
            fields:
              - { label: 眉题, name: eyebrow, widget: string }
              - { label: 标题, name: title, widget: string }
              - { label: 内容, name: text, widget: text }
      - name: contests_page_copy
        label: 比赛页文案
        file: src/content/site-contests-page/contests-page.yaml
        fields:
          - { label: 页面标题, name: pageTitle, widget: string }
          - { label: 页面描述, name: pageDescription, widget: text }
          - { label: 眉题, name: heroEyebrow, widget: string }
          - { label: 主标题, name: heroTitle, widget: string }
          - { label: 介绍, name: heroIntro, widget: text }
          - { label: 比赛标签, name: contestLabel, widget: string }
          - { label: 篇数后缀, name: countSuffix, widget: string }
          - { label: 方向前缀, name: tracksPrefix, widget: string }
          - { label: 最新内容前缀, name: latestPrefix, widget: string }
          - { label: 空方向提示, name: emptyTracksText, widget: string }
      - name: tags_page_copy
        label: 标签页文案
        file: src/content/site-tags-page/tags-page.yaml
        fields:
          - { label: 页面标题, name: pageTitle, widget: string }
          - { label: 页面描述, name: pageDescription, widget: text }
          - { label: 眉题, name: heroEyebrow, widget: string }
          - { label: 主标题, name: heroTitle, widget: string }
          - { label: 介绍, name: heroIntro, widget: text }
          - { label: 最新内容前缀, name: latestPrefix, widget: string }
      - name: detail_page_copy
        label: 详情页固定文案
        file: src/content/site-detail-pages/detail-pages.yaml
        fields:
          - label: 分类详情页
            name: categoryPage
            widget: object
            fields:
              - { label: 眉题, name: pageEyebrow, widget: string }
              - { label: 页面描述模板, name: pageDescriptionTemplate, widget: string }
              - { label: 文章统计标签, name: postsLabel, widget: string }
              - { label: 比赛统计标签, name: contestsLabel, widget: string }
              - { label: 最近更新标签, name: latestUpdateLabel, widget: string }
              - { label: 最近更新空状态, name: emptyLatestUpdateText, widget: string }
              - { label: 概览标签, name: overviewLabel, widget: string }
              - { label: 概览说明, name: overviewBody, widget: text }
              - { label: 常见标签标题, name: commonTagsLabel, widget: string }
              - { label: 常见标签空状态, name: commonTagsEmpty, widget: string }
              - { label: 常见方向标题, name: commonTracksLabel, widget: string }
              - { label: 常见方向空状态, name: commonTracksEmpty, widget: string }
              - { label: 话题标题, name: topicsLabel, widget: string }
              - { label: 话题空状态, name: topicsEmpty, widget: string }
              - { label: 内容区空状态, name: emptyFeed, widget: text }
          - label: 比赛详情页
            name: contestPage
            widget: object
            fields:
              - { label: 眉题, name: pageEyebrow, widget: string }
              - { label: 页面描述模板, name: pageDescriptionTemplate, widget: string }
              - { label: 导语, name: heroIntro, widget: text }
              - { label: 篇数文案模板, name: postCountTemplate, widget: string }
              - { label: 最近更新前缀, name: latestPrefix, widget: string }
          - label: 标签详情页
            name: tagPage
            widget: object
            fields:
              - { label: 眉题, name: pageEyebrow, widget: string }
              - { label: 页面描述模板, name: pageDescriptionTemplate, widget: string }
              - { label: 导语模板, name: heroIntroTemplate, widget: string }
      - name: not_found_page_copy
        label: 404 页面文案
        file: src/content/site-not-found/not-found.yaml
        fields:
          - { label: 页面标题, name: pageTitle, widget: string }
          - { label: 页面描述, name: pageDescription, widget: text }
          - { label: 眉题, name: heroEyebrow, widget: string }
          - { label: 主标题, name: heroTitle, widget: string }
          - { label: 介绍, name: heroIntro, widget: text }
          - { label: 主按钮文案, name: primaryLinkLabel, widget: string }
          - { label: 次按钮文案, name: secondaryLinkLabel, widget: string }

  - name: site_center
    label: 全站设置
    delete: false
    description: 品牌名、站点标题、评论系统这些全站级配置放在这里。
    editor:
      preview: false
    files:
      - name: site_brand
        label: 品牌与基础信息
        file: src/content/site-brand/brand.yaml
        fields:
          - { label: 品牌简称, name: brandMark, widget: string }
          - { label: 网站标题, name: siteTitle, widget: string }
          - { label: 顶部副标题, name: headerTagline, widget: string }
          - { label: 网站描述, name: siteDescription, widget: text }
          - { label: 页脚描述, name: footerDescription, widget: text }
          - { label: 版权名称, name: copyrightName, widget: string }
      - name: site_comments
        label: 评论区设置
        file: src/content/site-comments/comments.yaml
        fields:
