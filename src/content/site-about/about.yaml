focusTitle: 现在主要写这些
aboutFocusAreas:
  - 打完比赛之后整理出来的单题 WP 和整场比赛记录。
  - CTF Web、电子取证、流量分析这些方向里的复盘文章。
  - 比赛里反复出现的知识点和工具用法总结。
writingLabel: 写作方式
writingTitle: 尽量把过程也写出来
aboutWritingApproach:
  - 先记比赛背景、题目入口和当时的判断信号，再展开过程。
  - 尽量写出“为什么当时想到这个方向”，而不只是最后的 payload 或脚本。
  - 在能说明问题的前提下，尽量把关键步骤、证据链和复盘结论写完整。
