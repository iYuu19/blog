categories:
  - name: 比赛 WP
    slug: 比赛-wp
    description: 这里主要收录单题解法、关键 payload、脚本和过程记录。
    writingFocus: 更偏单题过程和解题细节，适合按题目类型快速浏览。
    exampleTopics:
      - Web 题解
      - Misc 题解
      - 电子取证单题
    sortOrder: 10
  - name: 赛后复盘
    slug: 赛后复盘
    description: 这里会放整场比赛的总结，不只是单题过程。
    writingFocus: 更偏整场节奏、失误点、团队配合、赛后回看和后续补题计划。
    exampleTopics:
      - 整场比赛总结
      - 赛中失误记录
      - 复盘清单
    sortOrder: 20
  - name: 专题总结
    slug: 专题总结
    description: 这里会长期整理反复出现的知识点、方法和题型。
    writingFocus: 更偏方法整理、知识点归纳、工具对比和做题套路总结。
    exampleTopics:
      - 原型污染总结
      - 流量分析笔记
      - 常见取证思路
    sortOrder: 30
  - name: 学习笔记
    slug: 学习笔记
    description: 这里会更新平时学习过程中的零散记录和阶段性总结。
    writingFocus: 更偏平时积累，不一定来自比赛，也可以是工具学习和实验过程。
    exampleTopics:
      - 工具试用
      - 环境搭建
      - 新知识速记
    sortOrder: 40
  - name: 工具记录
    slug: 工具记录
    description: 这里会整理常用工具的使用方法、场景和踩坑记录。
    writingFocus: 更偏工具怎么装、怎么用、适合什么场景、踩过什么坑。
    exampleTopics:
      - Wireshark 使用
      - Volatility 记录
      - Burp 插件整理
    sortOrder: 50
